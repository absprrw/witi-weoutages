<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #00ff00;
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #00ff00;
    }

    .panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 34vw;
      max-width: 720px;
      min-width: 420px;
      height: 100vh;
      background: #011049;
      color: #ffffff;
      padding: clamp(22px, 2vw, 40px);
      display: flex;
      flex-direction: column;
    }

    .header {
      flex: 0 0 auto;
      border-top: 10px solid #960000;
      padding-top: 18px;
      margin-bottom: 20px;
    }

    .title {
      font-size: clamp(28px, 2.1vw, 46px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .total {
      margin-top: 12px;
      font-size: clamp(20px, 1.5vw, 30px);
      font-weight: 600;
      line-height: 1.1;
      color: #ffb3b3;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .list {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: clamp(10px, 0.9vw, 18px);
      min-height: 0;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid rgba(150, 0, 0, 0.5);
    }

    .county {
      min-width: 0;
      font-size: clamp(22px, 1.7vw, 36px);
      font-weight: 600;
      line-height: 1.05;
    }

    .value {
      flex: 0 0 auto;
      font-size: clamp(24px, 1.9vw, 38px);
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .loading,
    .error {
      position: absolute;
      top: 50%;
      right: 17vw;
      transform: translate(50%, -50%);
      color: #ffffff;
      font-size: 30px;
      font-weight: 700;
    }

    .error {
      color: #ffb4b4;
    }

    @media (max-width: 1100px) {
      .panel {
        width: 42vw;
        min-width: 360px;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div id="content" class="loading">Loading outages...</div>
  </div>

  <script>
    const SOURCE_URL = "https://witi-weoutages.schmidtya327.workers.dev/";

    const TARGET_COUNTIES = [
      "milwaukee",
      "waukesha",
      "ozaukee",
      "washington",
      "racine",
      "kenosha",
      "walworth",
      "dodge",
      "jefferson",
      "fond du lac",
      "sheboygan"
    ];

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function render(data) {
      const rows = data.counties.map(county => `
        <div class="row">
          <div class="county">${county.label}</div>
          <div class="value">${formatNumber(county.affected)}</div>
        </div>
      `).join("");

      const html = `
        <div class="panel">
          <div class="header">
            <div class="title">WE Energies Outages</div>
            <div class="total">${formatNumber(data.totalCustomersOut)} Customers Out</div>
          </div>

          <div class="list">
            ${rows}
          </div>
        </div>
      `;

      document.getElementById("content").className = "";
      document.getElementById("content").innerHTML = html;
    }

    function renderError(message) {
      const content = document.getElementById("content");
      content.className = "error";
      content.textContent = message || "Unable to load data";
    }

    async function loadData() {
      try {
        const response = await fetch(SOURCE_URL);
        const raw = await response.json();

        const countyTotals = {};
        TARGET_COUNTIES.forEach(c => countyTotals[c] = 0);

        let totalCustomersOut = 0;

        raw.forEach(outage => {
          (outage.Slices || []).forEach(slice => {
            const county = (slice.County || "").toLowerCase().trim();
            const affected = Number(slice.AffectedCusts || 0);

            totalCustomersOut += affected;

            if (countyTotals.hasOwnProperty(county)) {
              countyTotals[county] += affected;
            }
          });
        });

        const counties = Object.keys(countyTotals)
          .map(c => ({
            label: c.replace(/\b\w/g, l => l.toUpperCase()) + " County",
            affected: countyTotals[c]
          }))
          .sort((a, b) => b.affected - a.affected);

        render({
          totalCustomersOut,
          counties
        });
      } catch (e) {
        renderError("Unable to load data");
        console.error(e);
      }
    }

    loadData();
    setInterval(loadData, 600000);
    setInterval(() => location.reload(), 700000);
  </script>
</body>
</html>
