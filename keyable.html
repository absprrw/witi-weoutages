<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #011049;
      color: #ffffff;
      font-family: 'Montserrat', sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: clamp(20px, 4vw, 80px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: linear-gradient(180deg, #02135c 0%, #011049 100%);
    }

    .wrap {
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: clamp(16px, 1.6vw, 28px);
      width: 100%;
    }

    .title {
      font-size: clamp(28px, 3vw, 58px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .timestamp {
      flex: 0 0 auto;
      text-align: right;
      font-size: clamp(14px, 1.1vw, 20px);
      line-height: 1.35;
      color: #d5def0;
    }

    .totalBar {
      width: 100%;
      margin-bottom: clamp(18px, 2vw, 32px);
      border-radius: 0;
      background: linear-gradient(90deg, #7a0000 0%, #960000 100%);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      padding: clamp(16px, 1.5vw, 28px) clamp(18px, 1.8vw, 32px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
    }

    .totalLabel {
      font-size: clamp(24px, 2.2vw, 52px);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.05;
    }

    .totalValue {
      font-size: clamp(34px, 3.4vw, 72px);
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 1vw, 18px);
      width: 100%;
    }

    .countyCard {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.06);
      border-left: 8px solid #960000;
      padding: clamp(14px, 1.1vw, 24px) clamp(16px, 1.4vw, 24px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
      min-width: 0;
    }

    .countyName {
      min-width: 0;
      padding-right: 12px;
      font-size: clamp(22px, 2.2vw, 50px);
      font-weight: 600;
      line-height: 1.08;
    }

    .countyValue {
      flex: 0 0 auto;
      font-size: clamp(24px, 2.4vw, 54px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
    }

    .loading,
    .error {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 40vh;
      font-size: clamp(22px, 2vw, 34px);
      font-weight: 700;
      text-align: center;
    }

    .error {
      color: #ffb4b4;
    }

    @media (max-width: 900px) {
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .timestamp {
        text-align: left;
      }

      .totalBar {
        flex-direction: column;
        align-items: flex-start;
      }

      .totalValue {
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="wrap">
      <div class="topbar">
        <div class="title">WE Energies Outages</div>
        <div class="timestamp" id="timestamp">Loading...</div>
      </div>

      <div id="content" class="loading">Loading outage totals...</div>
    </div>
  </div>

  <script>
    const SOURCE_URL = "https://witi-weoutages.schmidtya327.workers.dev/";

    const TARGET_COUNTIES = [
      "milwaukee",
      "waukesha",
      "ozaukee",
      "washington",
      "racine",
      "kenosha",
      "walworth",
      "dodge",
      "jefferson",
      "fond du lac",
      "sheboygan"
    ];

    function formatNumber(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function formatTimestamp(date) {
      const d = new Date(date);

      return d.toLocaleString("en-US", {
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function render(data) {
      document.getElementById("timestamp").innerHTML =
        "<strong>Data Updated</strong><br>" + formatTimestamp(data.updatedAt);

      const cards = data.counties.map(county => `
        <div class="countyCard">
          <div class="countyName">${county.label}</div>
          <div class="countyValue">${formatNumber(county.affected)}</div>
        </div>
      `).join("");

      const html = `
        <div class="totalBar">
          <div class="totalLabel">Total WE Energies Customers Out</div>
          <div class="totalValue">${formatNumber(data.totalCustomersOut)}</div>
        </div>

        <div class="list">
          ${cards}
        </div>
      `;

      const content = document.getElementById("content");
      content.className = "";
      content.innerHTML = html;
    }

    function renderError(message) {
      const content = document.getElementById("content");
      content.className = "error";
      content.textContent = message || "Unable to load outage data.";
      document.getElementById("timestamp").textContent = "Update failed";
    }

    async function loadData() {
      try {
        const response = await fetch(SOURCE_URL);
        const raw = await response.json();

        const countyTotals = {};
        TARGET_COUNTIES.forEach(c => countyTotals[c] = 0);

        let totalCustomersOut = 0;

        raw.forEach(outage => {
          const slices = outage.Slices || [];

          slices.forEach(slice => {
            const county = (slice.County || "").toLowerCase().trim();
            const affected = Number(slice.AffectedCusts || 0);

            totalCustomersOut += affected;

            if (countyTotals.hasOwnProperty(county)) {
              countyTotals[county] += affected;
            }
          });
        });

        const counties = Object.keys(countyTotals)
          .map(c => ({
            label: c.replace(/\b\w/g, l => l.toUpperCase()) + " County",
            affected: countyTotals[c]
          }))
          .sort((a, b) => b.affected - a.affected);

        render({
          updatedAt: new Date(),
          totalCustomersOut,
          counties
        });

      } catch (e) {
        renderError("Unable to load outage data.");
        console.error(e);
      }
    }

    loadData();

    setInterval(loadData, 600000);
    setInterval(() => location.reload(), 1800000);
  </script>
</body>
</html>
