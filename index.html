<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

html, body {
margin:0;
padding:0;
width:100%;
height:100%;
background:#011049;
color:#ffffff;
font-family:'Montserrat',sans-serif;
}

.page{
box-sizing:border-box;
width:100%;
min-height:100vh;
padding:clamp(20px,4vw,80px);
display:flex;
flex-direction:column;
justify-content:center;
background:linear-gradient(180deg,#02135c 0%,#011049 100%);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
margin-bottom:clamp(12px,1.4vw,22px);
width:100%;
}

.brandBlock{
display:flex;
flex-direction:column;
gap:4px;
min-width:0;
}

.title{
font-size:clamp(30px,3vw,58px);
font-weight:700;
line-height:1;
letter-spacing:0.03em;
text-transform:uppercase;
}

.timestamp{
flex:0 0 auto;
text-align:right;
font-size:clamp(14px,1.1vw,20px);
line-height:1.35;
color:#d5def0;
}

.totalBar{
box-sizing:border-box;
margin-bottom:clamp(12px,1.4vw,22px);
border-radius:0px;
background:linear-gradient(90deg,#7a0000 0%,#960000 100%);
box-shadow:0 10px 30px rgba(0,0,0,0.25);
padding:clamp(12px,1.2vw,24px) clamp(16px,1.6vw,28px);
display:flex;
justify-content:space-between;
align-items:center;
gap:18px;
width:100%;
}

.totalLabel{
font-size:clamp(22px,2.1vw,50px);
font-weight:600;
letter-spacing:0.04em;
text-transform:uppercase;
line-height:1.05;
}

.totalValue{
font-size:clamp(28px,2.8vw,52px);
font-weight:600;
line-height:1;
white-space:nowrap;
font-variant-numeric:tabular-nums;
font-feature-settings:"tnum";
}

.board{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
gap:clamp(10px,1vw,18px) clamp(14px,1.2vw,24px);
min-height:0;
align-content:start;
width:100%;
}

.column{
display:flex;
flex-direction:column;
gap:clamp(10px,1vw,18px);
min-width:0;
}

.countyCard{
display:flex;
justify-content:space-between;
align-items:center;
gap:18px;
border-radius:0px;
background:rgba(255,255,255,0.06);
border-left:8px solid #960000;
padding:clamp(12px,1vw,22px) clamp(14px,1.2vw,22px);
box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05);
min-width:0;
}

.countyName{
font-size:clamp(20px,2vw,50px);
font-weight:600;
line-height:1.08;
padding-right:12px;
min-width:0;
}

.countyValue{
flex:0 0 auto;
font-size:clamp(22px,2.1vw,50px);
font-weight:600;
letter-spacing:-0.02em;
line-height:1;
white-space:nowrap;
font-variant-numeric:tabular-nums;
font-feature-settings:"tnum";
}

.loading,
.error{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:clamp(22px,2vw,34px);
font-weight:700;
text-align:center;
}

.error{
color:#ffb4b4;
}

@media (max-width:1100px){

.board{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
}

.timestamp{
text-align:left;
}

.totalBar{
flex-direction:column;
align-items:flex-start;
}

.totalValue{
white-space:normal;
}

}

</style>
</head>

<body>

<div class="page">

<div class="topbar">
<div class="brandBlock">
<div class="title">WE Energies Outages</div>
</div>
<div class="timestamp" id="timestamp">Loading...</div>
</div>

<div id="content" class="loading">
Loading outage totals...
</div>

</div>

<script>

const SOURCE_URL =
"https://witi-weoutages.schmidtya327.workers.dev";

const TARGET_COUNTIES = [
"milwaukee",
"waukesha",
"ozaukee",
"washington",
"racine",
"kenosha",
"walworth",
"dodge",
"jefferson",
"fond du lac",
"sheboygan"
];

function formatNumber(value){
return Number(value||0).toLocaleString('en-US');
}

function formatTimestamp(date){

const d = new Date(date);

return d.toLocaleString('en-US',{
month:'short',
day:'numeric',
hour:'numeric',
minute:'2-digit'
});

}

function render(data){

document.getElementById('timestamp').innerHTML =
'<strong>Data Updated</strong><br>'+formatTimestamp(data.updatedAt);

const splitIndex = Math.ceil(data.counties.length/2);

const leftColumn = data.counties.slice(0,splitIndex);
const rightColumn = data.counties.slice(splitIndex);

function buildCards(counties){

return counties.map(county=>`
<div class="countyCard">
<div class="countyName">${county.label}</div>
<div class="countyValue">${formatNumber(county.affected)}</div>
</div>
`).join('');

}

const html = `

<div class="totalBar">
<div class="totalLabel">Total WE Energies Customers Out</div>
<div class="totalValue">${formatNumber(data.totalCustomersOut)}</div>
</div>

<div class="board">

<div class="column">
${buildCards(leftColumn)}
</div>

<div class="column">
${buildCards(rightColumn)}
</div>

</div>
`;

const content = document.getElementById('content');
content.className='';
content.innerHTML=html;

}

async function loadData(){

try{

const response = await fetch(SOURCE_URL);
const raw = await response.json();

const countyTotals = {};
TARGET_COUNTIES.forEach(c => countyTotals[c]=0);

let totalCustomersOut = 0;

raw.forEach(outage=>{

const slices = outage.Slices || [];

slices.forEach(slice=>{

const county = (slice.County||"").toLowerCase().trim();
const affected = Number(slice.AffectedCusts||0);

totalCustomersOut += affected;

if(countyTotals.hasOwnProperty(county)){
countyTotals[county] += affected;
}

});

});

const counties = Object.keys(countyTotals)
.map(c=>({
label:c.replace(/\b\w/g,l=>l.toUpperCase())+" County",
affected:countyTotals[c]
}))
.sort((a,b)=>b.affected-a.affected);

render({
updatedAt:new Date(),
totalCustomersOut,
counties
});

}catch(e){

document.getElementById("content").innerText =
"Unable to load outage data";

}

}

loadData();

// refresh outage data every 10 minutes
setInterval(loadData,600000);

// full reload every 30 minutes
setInterval(()=>location.reload(),1800000);

</script>

</body>
</html>
